<header class="border-b border-zinc-200 bg-white">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
    <a href="/dashboard" class="text-lg font-semibold text-emerald-700">FitCover India</a>
    <nav class="flex items-center gap-6 text-sm">
      <a href="/dashboard" class="{% if active == 'dashboard' %}font-semibold text-emerald-700{% else %}text-zinc-600{% endif %}">Overview</a>
      <a href="/dashboard/devices" class="{% if active == 'devices' %}font-semibold text-emerald-700{% else %}text-zinc-600{% endif %}">Devices</a>
      <a href="/dashboard/rewards" class="{% if active == 'rewards' %}font-semibold text-emerald-700{% else %}text-zinc-600{% endif %}">Rewards</a>
      <span class="hidden text-zinc-500 sm:inline">{{ user.email }}</span>
      <form method="post" action="/logout"><button type="submit" class="rounded-lg border border-zinc-200 px-3 py-1.5 text-zinc-600 hover:bg-zinc-50">Log out</button></form>
    </nav>
  </div>
</header>
