{% extends "base.html" %}
{% block title %}Register — FitCover India{% endblock %}
{% block body %}
<div class="flex min-h-screen items-center justify-center px-4">
  <div class="w-full max-w-md rounded-2xl border border-zinc-200 bg-white p-8 shadow-sm">
    <h1 class="text-2xl font-bold">Create account</h1>
    <p class="mt-1 text-sm text-zinc-500">Track fitness, earn rewards — never pay more for getting less active</p>
    {% if error %}<p class="mt-4 text-sm text-red-600">{{ error }}</p>{% endif %}
    <form method="post" action="/register" class="mt-6 space-y-4">
      <div>
        <label class="mb-1 block text-sm font-medium">Name</label>
        <input name="name" type="text" class="w-full rounded-lg border border-zinc-300 px-3 py-2 text-sm">
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium">Email</label>
        <input name="email" type="email" required class="w-full rounded-lg border border-zinc-300 px-3 py-2 text-sm">
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium">Password</label>
        <input name="password" type="password" required minlength="8" class="w-full rounded-lg border border-zinc-300 px-3 py-2 text-sm">
      </div>
      <button type="submit" class="w-full rounded-lg bg-emerald-700 py-2.5 text-sm font-semibold text-white hover:bg-emerald-800">Create account</button>
    </form>
    <p class="mt-4 text-center text-sm text-zinc-500">Already have an account? <a href="/login" class="font-medium text-emerald-700 hover:underline">Sign in</a></p>
  </div>
</div>
{% endblock %}
